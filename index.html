<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Sistem Keuangan Pesantren</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:20px;
margin:10px 0;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
}

button{
padding:10px;
background:green;
color:white;
border:none;
margin-top:10px;
width:100%;
}

.nav{
display:flex;
gap:10px;
margin-bottom:20px;
}

.nav button{
flex:1;
}

.hidden{
display:none;
}

.stat{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.stat .card{
flex:1;
min-width:150px;
text-align:center;
}

.filter{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.filter input{
flex:1;
}

</style>

</head>

<body>

<div class="container">

<h1>Sistem Keuangan Pesantren</h1>

<div id="loginPage" class="card">

<h2>Login</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<div id="app" class="hidden">

<div class="nav">

<button onclick="showPage('dashboard')">Dashboard</button>
<button onclick="showPage('keuangan')">Input Keuangan</button>
<button onclick="showPage('inventaris')">Inventaris</button>

</div>

<div id="dashboard" class="page">

<div class="card">

<h3>Filter Tanggal</h3>

<div class="filter">

<input type="date" id="tglMulai">
<input type="date" id="tglAkhir">

<button onclick="loadDashboard()">Filter</button>

</div>

</div>

<div class="stat">

<div class="card">
<h3>Saldo</h3>
<p id="saldo">0</p>
</div>

<div class="card">
<h3>Pemasukan</h3>
<p id="masuk">0</p>
</div>

<div class="card">
<h3>Pengeluaran</h3>
<p id="keluar">0</p>
</div>

</div>

<div class="card">

<canvas id="chart"></canvas>

</div>

</div>

<div id="keuangan" class="page hidden">

<div class="card">

<h2>Input Keuangan</h2>

<input id="tanggal" type="date">
<input id="keterangan" placeholder="Keterangan">
<input id="subKategori" placeholder="Kategori">
<input id="masukInput" placeholder="Uang Masuk">
<input id="keluarInput" placeholder="Uang Keluar">
<input id="pelapor" placeholder="Pelapor">

<button onclick="kirimKeuangan()">Simpan</button>

</div>

</div>

<div id="inventaris" class="page hidden">

<div class="card">

<h2>Inventaris Kantin</h2>

<input id="barang" placeholder="Nama Barang">
<input id="jumlah" placeholder="Jumlah">

<select id="tipe">
<option>Masuk</option>
<option>Keluar</option>
</select>

<button onclick="kirimInventaris()">Simpan</button>

</div>

</div>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyH8SiNroAgjnhvI0Izw-VBG_xkBUq4FaQ3IyB18LqWeE1-1Yi9ogFjJH26FolP5rw5ig/exec";

let chart;

function login(){

let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(p=="1111"){

document.getElementById("loginPage").style.display="none";
document.getElementById("app").classList.remove("hidden");

loadDashboard();

}else{

alert("Password salah");

}

}

function showPage(page){

document.querySelectorAll(".page").forEach(p=>p.classList.add("hidden"));

document.getElementById(page).classList.remove("hidden");

}

function kirimKeuangan(){

const data={

action:"keuangan",
tanggal:document.getElementById("tanggal").value,
keterangan:document.getElementById("keterangan").value,
subKategori:document.getElementById("subKategori").value,
masuk:document.getElementById("masukInput").value,
keluar:document.getElementById("keluarInput").value,
pelapor:document.getElementById("pelapor").value

};

fetch(API,{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.text())
.then(res=>{
alert(res);
loadDashboard();
});

}

function kirimInventaris(){

const data={

action:"inventaris",
barang:document.getElementById("barang").value,
jumlah:document.getElementById("jumlah").value,
tipe:document.getElementById("tipe").value

};

fetch(API,{
method:"POST",
body:JSON.stringify(data)
})
.then(res=>res.text())
.then(res=>{
alert(res);
});

}

function loadDashboard(){

fetch(API+"?action=dashboard")
.then(res=>res.json())
.then(data=>{

let mulai=document.getElementById("tglMulai").value;
let akhir=document.getElementById("tglAkhir").value;

let masuk=data.masuk;
let keluar=data.keluar;

document.getElementById("saldo").innerText=masuk-keluar;
document.getElementById("masuk").innerText=masuk;
document.getElementById("keluar").innerText=keluar;

drawChart(masuk,keluar);

});

}

function drawChart(masuk,keluar){

const ctx=document.getElementById("chart");

if(chart){
chart.destroy();
}

chart=new Chart(ctx,{
type:"pie",
data:{
labels:["Pemasukan","Pengeluaran"],
datasets:[{
data:[masuk,keluar],
backgroundColor:["green","red"]
}]
}
});

}

</script>

</body>
</html>
