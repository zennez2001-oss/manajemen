<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistem Keuangan Pesantren Modern</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --primary: #0d9488; /* Hijau Tosca */
    --primary-dark: #0f766e; /* Hijau Tua */
    --secondary: #1e3a8a; /* Biru */
    --accent: #fbbf24; /* Kuning */
    --bg-main: #f0fdfa;
    --card-bg: #ffffff;
    --text-main: #1f2937;
    --shadow-3d: 6px 6px 0px rgba(0,0,0,0.15);
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0d9488 0%, #0f766e 60%, #1e3a8a 100%);
    margin: 0;
    padding: 0;
    color: var(--text-main);
    min-height: 100vh;
    overflow-x: hidden;
}

.bg-ornament {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    z-index: -1; pointer-events: none; opacity: 0.1;
    background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI2MCIgaGVpZ2h0PSI2MCIgdmlld0JveD0iMCAwIDYwIDYwIj48cGF0aCBkPSJNMCAwaDYwdjYwaC02MHoiIGZpbGw9Im5vbmUiLz48cGF0aCBkPSJNMzAgMzBtLTEgMGwxIC0xbTEgMWwtMSAtMW0tMSAxbDEgMW0xIC0xbC0xIC0xIiBzdHJva2U9IiNmZmYiIHN0cm9rZS13aWR0aD0iMSIvPjwvc3ZnPg==');
}

.container { max-width: 1000px; margin: auto; padding: 20px; padding-bottom: 200px; }

header {
    text-align: center;
    margin-bottom: 20px;
    position: relative;
}

/* USER LOGIN TOP RIGHT */
.user-header {
    position: absolute;
    top: 10px; right: 10px;
    z-index: 100;
}
.user-header input {
    padding: 8px 15px; border-radius: 20px;
    border: 2px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.15);
    color: white; font-family: 'Poppins'; width: 150px;
    backdrop-filter: blur(5px);
}
.user-header input::placeholder { color: rgba(255,255,255,0.8); }
.user-header input:focus { background: white; color: var(--primary-dark); outline: none; width: 180px; }

/* LOGO */
.logo-svg { width: 80px; height: 80px; margin-bottom: 5px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); }

header h1 {
    margin: 0; font-weight: 800; font-size: 1.8rem; color: white;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
}

.ramadan-banner {
    background: linear-gradient(45deg, var(--accent), #f59e0b);
    padding: 8px 20px; border-radius: 20px;
    display: inline-block; margin-top: 10px;
    box-shadow: var(--shadow-3d); border-bottom: 4px solid #d97706;
}
.ramadan-text { font-family: 'Amiri', serif; font-size: 1.1rem; color: #78350f; margin: 0; font-weight: bold; }

.realtime-clock {
    margin-top: 8px; background: rgba(0,0,0,0.2);
    display: inline-block; padding: 4px 15px;
    border-radius: 50px; font-size: 0.8rem; color: #fff;
}

.card {
    background: var(--card-bg); padding: 20px; border-radius: 15px;
    box-shadow: var(--shadow-3d); margin-bottom: 20px;
    border-bottom: 5px solid #ccc;
    animation: fadeIn 0.5s ease;
}

.nav { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
.nav button {
    flex: 1; background: #fff; color: var(--primary-dark);
    border: none; padding: 10px; border-radius: 10px;
    font-weight: 700; cursor: pointer;
    border-bottom: 4px solid #ccc;
    transition: all 0.2s;
}
.nav button.active {
    background: var(--secondary); color: white;
    border-color: #1e3a8a;
    transform: translateY(2px);
}

.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
.stat-card {
    padding: 15px; border-radius: 12px; color: white; position: relative; overflow: hidden;
    border-bottom: 5px solid rgba(0,0,0,0.2);
    box-shadow: 4px 4px 0 rgba(0,0,0,0.1);
}
.stat-card.saldo { background: linear-gradient(135deg, #1e3a8a, #3b82f6); }
.stat-card.masuk { background: linear-gradient(135deg, #0f766e, #0d9488); }
.stat-card.keluar { background: linear-gradient(135deg, #b91c1c, #ef4444); }
.stat-card h3 { margin: 0; font-size: 12px; opacity: 0.9; }
.stat-card p { margin: 5px 0 0; font-size: 18px; font-weight: 700; }
.stat-icon { position: absolute; right: -5px; bottom: -10px; font-size: 50px; opacity: 0.2; transform: rotate(-15deg); }

/* BUTTONS 3D */
.btn-3d {
    cursor: pointer; padding: 10px 15px; border: none; border-radius: 8px;
    font-weight: 600; font-size: 13px; color: white;
    background: var(--primary);
    border-bottom: 4px solid #0a6b61;
    transition: all 0.1s;
    display: inline-flex; align-items: center; gap: 5px;
}
.btn-3d:active { transform: translateY(4px); }
.btn-3d.secondary { background: var(--secondary); border-color: #1e3a8a; }
.btn-3d.accent { background: var(--accent); color: #000; border-color: #d97706; }
.btn-3d.danger { background: #ef4444; border-color: #b91c1c; }
.btn-3d.full { width: 100%; justify-content: center; }

input, select {
    width: 100%; padding: 10px; margin-bottom: 12px; border: 2px solid #e5e7eb;
    border-radius: 8px; box-sizing: border-box; font-family: 'Poppins', sans-serif;
}

.table-container { overflow-x: auto; margin-top: 10px; }
table { width: 100%; border-collapse: collapse; min-width: 600px; }
th, td { padding: 10px 12px; text-align: left; border-bottom: 2px solid #f3f4f6; font-size: 12px; }
th { background: #f0fdfa; color: var(--primary-dark); font-weight: 700; }
.badge { padding: 3px 8px; border-radius: 12px; font-size: 10px; font-weight: 600; }
.badge-success { background: #d1fae5; color: #065f46; }
.badge-danger { background: #fee2e2; color: #991b1b; }

/* CHART CONTAINER FIX */
.chart-container {
    position: relative;
    width: 50%; /* Ukuran 1/2 dari container */
    height: 250px; /* Tinggi tetap agar tidak hilang */
    margin: 0 auto; /* Tengah */
    padding: 15px;
    background: white;
    border-radius: 15px;
    box-shadow: 5px 5px 15px rgba(0,0,0,0.2); /* Efek 3D */
    border-bottom: 5px solid #e5e7eb;
}

/* SANTRI ANIMATED */
.santri-helper {
    position: fixed; bottom: 10px; right: 20px; z-index: 999;
    width: 100px; height: 150px;
    animation: bounce 2s infinite;
    cursor: pointer;
}
@keyframes bounce {
    0%, 100% {transform: translateY(0);}
    50% {transform: translateY(-10px);}
}
.bubble-chat {
    position: absolute; top: -50px; left: -90px;
    background: white; padding: 8px 12px; border-radius: 10px;
    font-size: 11px; width: 120px; text-align: center;
    box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    display: none; font-weight: 600; color: var(--primary-dark);
}
.bubble-chat::after {
    content: ''; position: absolute; bottom: -6px; right: 15px;
    border-width: 6px 6px 0; border-style: solid; border-color: white transparent;
}
.hidden { display: none; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
</style>
</head>
<body>

<div class="bg-ornament"></div>

<div class="container">
    
    <header>
        <!-- USER LOGIN -->
        <div class="user-header">
            <input type="text" id="namaPengguna" placeholder="Nama Pengguna...">
        </div>

        <!-- LOGO SVG -->
        <svg class="logo-svg" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="48" fill="#fff" stroke="#0d9488" stroke-width="4"/>
            <path d="M30 70 Q50 20 70 70" fill="none" stroke="#0d9488" stroke-width="4"/>
            <circle cx="50" cy="45" r="12" fill="#fbbf24"/>
            <path d="M25 75 Q50 85 75 75" fill="#0d9488" opacity="0.8"/>
        </svg>

        <h1>Keuangan Pesantren</h1>
        
        <div class="ramadan-banner">
            <p class="ramadan-text">Ramadhan Kareem</p>
        </div>

        <div id="clock" class="realtime-clock">
            <i class="fas fa-clock"></i> <span id="time">Loading...</span>
        </div>
    </header>

    <!-- NAV -->
    <div class="nav">
        <button onclick="showPage('dashboard')" id="nav-dashboard" class="active"><i class="fas fa-chart-pie"></i> Dashboard</button>
        <button onclick="showPage('keuangan')" id="nav-keuangan"><i class="fas fa-wallet"></i> Keuangan</button>
        <button onclick="showPage('inventaris')" id="nav-inventaris"><i class="fas fa-boxes-stacked"></i> Inventaris</button>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="page">
        <div class="card" style="padding:15px;">
            <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
                <h3 style="margin:0;"><i class="fas fa-calendar"></i> Filter</h3>
                <div style="display:flex; gap:10px;">
                    <input type="date" id="tglMulai" style="width:130px; margin:0;">
                    <input type="date" id="tglAkhir" style="width:130px; margin:0;">
                    <button class="btn-3d secondary" onclick="loadDashboard()"><i class="fas fa-search"></i></button>
                </div>
                <button class="btn-3d accent" onclick="printDashboard()"><i class="fas fa-file-pdf"></i> PDF</button>
            </div>
        </div>
        
        <div class="stat-grid">
            <div class="stat-card saldo"><h3>Total Saldo</h3><p id="saldo">Rp 0</p><i class="fas fa-piggy-bank stat-icon"></i></div>
            <div class="stat-card masuk"><h3>Pemasukan</h3><p id="masuk">Rp 0</p><i class="fas fa-hand-holding-dollar stat-icon"></i></div>
            <div class="stat-card keluar"><h3>Pengeluaran</h3><p id="keluar">Rp 0</p><i class="fas fa-receipt stat-icon"></i></div>
        </div>
        
        <div class="card">
            <div class="chart-container">
                <canvas id="chart"></canvas>
            </div>
        </div>
    </div>

    <!-- KEUANGAN -->
    <div id="keuangan" class="page hidden">
        <div class="card">
            <h2 style="margin-top:0;"><i class="fas fa-plus-circle"></i> Input Transaksi</h2>
            <label>Tanggal</label><input id="tanggal" type="date">
            <label>Keterangan</label><input id="keterangan" placeholder="Keterangan">
            <label>Kategori</label>
            <select id="kategoriKeuangan" onchange="toggleInput()">
                <option value="">-- Pilih --</option>
                <option value="Pemasukan">Pemasukan</option>
                <option value="Pengeluaran">Pengeluaran</option>
            </select>
            <label>Jumlah Masuk (Rp)</label><input id="masukInput" disabled>
            <label>Jumlah Keluar (Rp)</label><input id="keluarInput" disabled>
            <input type="hidden" id="editIdKeuangan">
            <div style="display:flex; gap:10px;">
                <button class="btn-3d full" onclick="kirimKeuangan()"><i class="fas fa-save"></i> Simpan</button>
                <button class="btn-3d danger hidden" id="btnCancel" onclick="cancelEdit()"><i class="fas fa-times"></i></button>
            </div>
        </div>
        <div class="card">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <h3 style="margin:0;">Riwayat</h3>
                <button class="btn-3d accent" onclick="printKeuangan()"><i class="fas fa-print"></i> Cetak PDF</button>
            </div>
            <div class="table-container">
                <table id="tableKeuangan">
                    <thead><tr><th>Tanggal</th><th>Ket</th><th>Kat</th><th>Masuk</th><th>Keluar</th><th>Aksi</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- INVENTARIS -->
    <div id="inventaris" class="page hidden">
        <div class="card">
            <h2 style="margin-top:0;"><i class="fas fa-boxes-stacked"></i> Input Inventaris</h2>
            <label>Nama Barang</label><input id="barang">
            <label>Jumlah</label><input id="jumlah" type="number">
            <select id="tipe"><option value="Masuk">Masuk</option><option value="Keluar">Keluar</option></select>
            <button class="btn-3d full" onclick="kirimInventaris()"><i class="fas fa-save"></i> Simpan</button>
        </div>
        <div class="card">
            <h3>Riwayat Stok</h3>
            <div class="table-container">
                <table id="tableInventaris"><thead><tr><th>Barang</th><th>Jumlah</th><th>Tipe</th><th>Waktu</th></tr></thead><tbody></tbody></table>
            </div>
        </div>
    </div>
</div>

<!-- SANTRI -->
<div class="santri-helper" onclick="speakIntro()">
    <div class="bubble-chat" id="chatBubble">Assalamualaikum!</div>
    <svg class="santri-svg" viewBox="0 0 200 300">
        <circle cx="100" cy="50" r="35" fill="#fbd38d"/>
        <path d="M65 35 Q100 -10 135 35 Q100 20 65 35" fill="#1f2937"/>
        <path d="M60 85 Q100 70 140 85 L150 180 H50 Z" fill="#0d9488"/>
        <path d="M60 90 L70 180 M100 85 L100 180 M140 90 L130 180" stroke="#004d40" stroke-width="2" opacity="0.5"/>
        <path d="M50 90 L20 150 L30 155 L55 110 L55 180 H145 L145 110 L170 155 L180 150 L150 90 Z" fill="#78350f"/>
        <path d="M55 180 L65 290 L85 290 L100 200 L115 290 L135 290 L145 180 Z" fill="#1f2937"/>
    </svg>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyH8SiNroAgjnhvI0Izw-VBG_xkBUq4FaQ3IyB18LqWeE1-1Yi9ogFjJH26FolP5rw5ig/exec";
let chart;

// --- UTILS ---
function updateClock() {
    document.getElementById('time').innerText = new Date().toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
}
setInterval(updateClock, 1000); updateClock();

function speak(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.lang = 'id-ID';
        window.speechSynthesis.speak(u);
    }
    const b = document.getElementById('chatBubble');
    b.innerText = text;
    b.style.display = 'block';
    setTimeout(() => b.style.display = 'none', 4000);
}

function speakIntro() {
    const t = ["Assalamualaikum, selamat datang.", "Jangan lupa isi nama di pojok kanan atas.", "Semoga sehat selalu."];
    speak(t[Math.floor(Math.random() * t.length)]);
}

// --- NAVIGATION ---
function showPage(page){
    document.querySelectorAll(".page").forEach(p => p.classList.add("hidden"));
    document.getElementById(page).classList.remove("hidden");
    document.querySelectorAll(".nav button").forEach(b => b.classList.remove("active"));
    document.getElementById("nav-" + page).classList.add("active");

    // LOAD DATA SAAT PINDAH TAB (PENTING!)
    if(page === 'dashboard') loadDashboard();
    if(page === 'keuangan') loadRiwayatKeuangan();
    if(page === 'inventaris') loadRiwayatInventaris();

    const m = { dashboard: "Ini dia ringkasan keuangan.", keuangan: "Yuk catat transaksi disini.", inventaris: "Catat inventaris disini." };
    speak(m[page]);
}

// --- KEUANGAN ---
function toggleInput(){
    const k = document.getElementById("kategoriKeuangan").value;
    document.getElementById("masukInput").disabled = k !== "Pemasukan";
    document.getElementById("keluarInput").disabled = k !== "Pengeluaran";
    if(k === "Pemasukan") document.getElementById("keluarInput").value = "";
    if(k === "Pengeluaran") document.getElementById("masukInput").value = "";
}

function kirimKeuangan(){
    const id = document.getElementById("editIdKeuangan").value;
    const data = {
        action: id ? "update_keuangan" : "keuangan",
        id: id,
        tanggal: document.getElementById("tanggal").value,
        keterangan: document.getElementById("keterangan").value,
        kategori: document.getElementById("kategoriKeuangan").value,
        masuk: document.getElementById("masukInput").value,
        keluar: document.getElementById("keluarInput").value,
        pelapor: document.getElementById("namaPengguna").value || "Admin"
    };
    
    if(!data.kategori || !data.tanggal) { alert("Lengkapi tanggal & kategori!"); return; }

    fetch(API, { method: "POST", body: JSON.stringify(data) })
    .then(res => res.text())
    .then(res => {
        alert(res);
        loadDashboard();
        loadRiwayatKeuangan();
        cancelEdit();
    });
}

function editKeuangan(id, tgl, ket, kat, masuk, keluar) {
    document.getElementById("editIdKeuangan").value = id;
    document.getElementById("tanggal").value = tgl;
    document.getElementById("keterangan").value = ket;
    document.getElementById("kategoriKeuangan").value = kat;
    toggleInput();
    document.getElementById("masukInput").value = masuk;
    document.getElementById("keluarInput").value = keluar;
    document.getElementById("btnCancel").classList.remove("hidden");
    window.scrollTo({ top: 0, behavior: 'smooth' });
    speak("Mode edit aktif.");
}

function cancelEdit() {
    document.getElementById("editIdKeuangan").value = "";
    document.getElementById("keterangan").value = "";
    document.getElementById("masukInput").value = "";
    document.getElementById("keluarInput").value = "";
    document.getElementById("kategoriKeuangan").value = "";
    toggleInput();
    document.getElementById("btnCancel").classList.add("hidden");
}

function loadDashboard(){
    fetch(API + "?action=dashboard")
    .then(res => res.json())
    .then(data => {
        const fmt = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 });
        document.getElementById("saldo").innerText = fmt.format(data.saldo || 0);
        document.getElementById("masuk").innerText = fmt.format(data.masuk || 0);
        document.getElementById("keluar").innerText = fmt.format(data.keluar || 0);
        drawChart(data.masuk || 0, data.keluar || 0);
    });
}

function loadRiwayatKeuangan(){
    fetch(API + "?action=riwayat_keuangan")
    .then(res => res.json())
    .then(data => {
        const tbody = document.querySelector("#tableKeuangan tbody");
        tbody.innerHTML = "";
        if(data && data.length > 0){
            data.forEach(row => {
                // row: [ID, Tanggal, Keterangan, Kategori, Masuk, Keluar]
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${row[1]}</td><td>${row[2]}</td>
                    <td><span class="badge ${row[3] == 'Pemasukan' ? 'badge-success' : 'badge-danger'}">${row[3]}</span></td>
                    <td style="color:green">${row[4]}</td><td style="color:red">${row[5]}</td>
                    <td><button class='btn-3d secondary' style='padding:3px 8px; font-size:10px;' onclick="editKeuangan('${row[0]}','${row[1]}','${row[2]}','${row[3]}','${row[4]}','${row[5]}')"><i class='fas fa-edit'></i></button></td>`;
                tbody.appendChild(tr);
            });
        } else { tbody.innerHTML = "<tr><td colspan='6' style='text-align:center'>Belum ada data</td></tr>"; }
    });
}

function loadRiwayatInventaris(){
    fetch(API + "?action=riwayat_inventaris")
    .then(res => res.json())
    .then(data => {
        const tbody = document.querySelector("#tableInventaris tbody");
        tbody.innerHTML = "";
        if(data && data.length > 0){
            data.forEach(row => {
                const tr = document.createElement("tr");
                tr.innerHTML = `<td>${row[1]}</td><td>${row[2]}</td><td><span class="badge ${row[3] == 'Masuk' ? 'badge-success' : 'badge-danger'}">${row[3]}</span></td><td>${row[4]}</td>`;
                tbody.appendChild(tr);
            });
        }
    });
}

function kirimInventaris(){
    const data = { action: "inventaris", barang: document.getElementById("barang").value, jumlah: document.getElementById("jumlah").value, tipe: document.getElementById("tipe").value };
    fetch(API, { method: "POST", body: JSON.stringify(data) })
    .then(res => res.text())
    .then(res => { alert(res); loadRiwayatInventaris(); });
}

// --- CHART ---
function drawChart(masuk, keluar){
    const ctx = document.getElementById("chart").getContext('2d');
    if(chart) chart.destroy();
    chart = new Chart(ctx, {
        type: "doughnut",
        data: { labels: ["Pemasukan", "Pengeluaran"], datasets: [{ data: [masuk, keluar], backgroundColor: ["#0f766e", "#ef4444"], borderWidth: 0 }] },
        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom' } } }
    });
}

// --- PDF ---
function printDashboard() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const nama = document.getElementById("namaPengguna").value || "Anonim";
    doc.setFontSize(20); doc.setTextColor(15, 118, 110);
    doc.text("Laporan Keuangan", 105, 20, null, null, "center");
    doc.setFontSize(12); doc.text(`PJ: ${nama}`, 105, 30, null, null, "center");
    doc.text(`Saldo: ${document.getElementById("saldo").innerText}`, 20, 50);
    doc.text(`Masuk: ${document.getElementById("masuk").innerText}`, 20, 60);
    doc.text(`Keluar: ${document.getElementById("keluar").innerText}`, 20, 70);
    doc.save("Dashboard.pdf");
    speak("PDF diunduh.");
}

function printKeuangan() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const nama = document.getElementById("namaPengguna").value || "Anonim";
    doc.text(`Riwayat Keuangan - PJ: ${nama}`, 105, 20, null, null, "center");
    // Loop data sederhana (tanpa plugin autotable)
    let y=40;
    doc.setFontSize(10);
    doc.text("Tgl | Ket | Masuk | Keluar", 20, y); y+=10;
    // Fetch data again? atau parse dom? simple fetch:
    fetch(API + "?action=riwayat_keuangan").then(r=>r.json()).then(data=>{
        data.forEach(r=>{
            doc.text(`${r[1]} | ${r[2].substring(0,10)} | ${r[4]} | ${r[5]}`, 20, y);
            y+=7;
            if(y>280){doc.addPage(); y=20;}
        });
        doc.save("Riwayat.pdf");
        speak("PDF Riwayat diunduh.");
    });
}

showPage('dashboard');

</script>
