<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sistem Keuangan Pesantren Modern</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --primary: #0d9488; /* Hijau Tosca */
    --primary-dark: #0f766e; /* Hijau Tua */
    --secondary: #1e3a8a; /* Biru */
    --accent: #fbbf24; /* Kuning */
    --bg-main: #f0fdfa;
    --card-bg: #ffffff;
    --text-main: #1f2937;
    --shadow-3d: 6px 6px 0px rgba(0,0,0,0.2);
    --shadow-3d-sm: 4px 4px 0px rgba(0,0,0,0.15);
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0d9488 0%, #0f766e 50%, #1e3a8a 100%);
    margin: 0;
    padding: 0;
    color: var(--text-main);
    position: relative;
    overflow-x: hidden;
    min-height: 100vh;
}

.bg-ornament {
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    z-index: -1; pointer-events: none; overflow: hidden;
}
.shape { position: absolute; opacity: 0.08; color: white; }
.shape-1 { top: 5%; left: 5%; font-size: 150px; transform: rotate(15deg); }
.shape-2 { top: 40%; right: -5%; font-size: 200px; transform: rotate(-20deg); }
.shape-3 { bottom: 10%; left: 10%; font-size: 100px; transform: rotate(45deg); }

.container { max-width: 1000px; margin: auto; padding: 20px; padding-bottom: 150px; /* Space for santri */ }

header {
    text-align: center;
    margin-bottom: 30px;
    animation: fadeInDown 0.8s ease;
    position: relative;
}

/* USER LOGIN TOP RIGHT */
.user-header {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 100;
}
.user-header input {
    padding: 8px 15px;
    border-radius: 20px;
    border: 2px solid rgba(255,255,255,0.5);
    background: rgba(255,255,255,0.2);
    color: white;
    font-family: 'Poppins';
    width: 150px;
    transition: all 0.3s;
}
.user-header input::placeholder { color: rgba(255,255,255,0.8); }
.user-header input:focus { background: white; color: var(--primary-dark); border-color: white; outline: none; width: 180px; }

/* LOGO SVG */
.logo-svg { width: 90px; height: 90px; margin-bottom: 10px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.2)); }

header h1 {
    margin: 0; font-weight: 800; font-size: 2rem; color: white;
    text-shadow: 2px 2px 0px rgba(0,0,0,0.2);
}

.ramadan-banner {
    background: linear-gradient(45deg, var(--accent), #f59e0b);
    padding: 10px 20px; border-radius: 0 20px 0 20px;
    display: inline-block; margin-top: 10px;
    box-shadow: 4px 4px 0px rgba(0,0,0,0.2);
}
.ramadan-text { font-family: 'Amiri', serif; font-size: 1.2rem; color: #78350f; margin: 0; font-weight: bold; }

.realtime-clock {
    margin-top: 10px; background: rgba(0,0,0,0.2);
    display: inline-block; padding: 5px 15px;
    border-radius: 50px; font-size: 0.85rem; color: #fff;
}

.card {
    background: var(--card-bg); padding: 25px; border-radius: 15px;
    box-shadow: var(--shadow-3d); margin-bottom: 25px;
    border: 2px solid rgba(255,255,255,0.5);
    border-bottom: 4px solid #ccc;
    transition: transform 0.2s;
}
.card:hover { transform: translateY(-2px); }

.nav {
    display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap;
}
.nav button {
    flex: 1; background: #fff; color: var(--primary-dark);
    border: none; padding: 12px; border-radius: 10px;
    font-weight: 700; cursor: pointer;
    border-bottom: 4px solid #ccc;
    box-shadow: var(--shadow-3d-sm);
    transition: all 0.2s;
}
.nav button.active {
    background: var(--secondary); color: white;
    border-color: #1e40af;
    transform: translateY(2px);
    box-shadow: 0 2px 0px rgba(0,0,0,0.2);
}

.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
.stat-card {
    padding: 20px; border-radius: 12px; color: white; position: relative; overflow: hidden;
    border-bottom: 5px solid rgba(0,0,0,0.2);
    box-shadow: var(--shadow-3d-sm);
}
.stat-card.saldo { background: var(--secondary); }
.stat-card.masuk { background: var(--primary-dark); }
.stat-card.keluar { background: #b91c1c; }
.stat-card h3 { margin: 0; font-size: 13px; opacity: 0.9; }
.stat-card p { margin: 8px 0 0; font-size: 20px; font-weight: 700; }
.stat-icon { position: absolute; right: -10px; bottom: -10px; font-size: 60px; opacity: 0.2; transform: rotate(-15deg); }

/* BUTTONS 3D */
.btn-3d {
    cursor: pointer; padding: 12px 20px; border: none; border-radius: 8px;
    font-weight: 600; font-size: 14px; color: white;
    background: var(--primary);
    border-bottom: 4px solid #0a6b61;
    box-shadow: 0 4px 0 #0a6b61;
    transition: all 0.1s;
    display: inline-flex; align-items: center; gap: 8px;
}
.btn-3d:active { transform: translateY(4px); box-shadow: none; }
.btn-3d.secondary { background: var(--secondary); border-color: #1e3a8a; box-shadow: 0 4px 0 #1e3a8a; }
.btn-3d.accent { background: var(--accent); color: #000; border-color: #d97706; box-shadow: 0 4px 0 #d97706; }
.btn-3d.danger { background: #ef4444; border-color: #b91c1c; box-shadow: 0 4px 0 #b91c1c; }
.btn-3d.full { width: 100%; justify-content: center; }

input, select {
    width: 100%; padding: 12px 15px; margin-bottom: 15px; border: 2px solid #e5e7eb;
    border-radius: 8px; box-sizing: border-box; font-family: 'Poppins', sans-serif;
    background: #fff; transition: all 0.3s;
}
input:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(13, 148, 136, 0.2); outline: none; }

.table-container { overflow-x: auto; margin-top: 15px; }
table { width: 100%; border-collapse: collapse; min-width: 600px; }
th, td { padding: 12px 15px; text-align: left; border-bottom: 2px solid #f3f4f6; font-size: 13px; }
th { background: #f0fdfa; color: var(--primary-dark); font-weight: 700; text-transform: uppercase; font-size: 11px; }
tr:hover { background: #f9fafb; }
.action-btn { cursor: pointer; margin-right: 5px; opacity: 0.7; }
.action-btn:hover { opacity: 1; }

/* Chart Container */
.chart-wrapper {
    width: 50%; margin: 0 auto; padding: 20px;
    background: white;
    border-radius: 50%;
    box-shadow: 5px 5px 15px rgba(0,0,0,0.2), -5px -5px 15px rgba(255,255,255,0.5);
    transform: perspective(500px) rotateX(10deg);
}

/* SANTRI ANIMATED */
.santri-helper {
    position: fixed; bottom: 20px; right: 20px; z-index: 999;
    width: 120px; height: 180px;
    animation: bounce 2s infinite;
    cursor: pointer;
}
@keyframes bounce {
    0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
    40% {transform: translateY(-20px);}
    60% {transform: translateY(-10px);}
}
.santri-svg { width: 100%; height: 100%; filter: drop-shadow(0 10px 5px rgba(0,0,0,0.3)); }
.bubble-chat {
    position: absolute; top: -60px; left: -100px;
    background: white; padding: 10px 15px; border-radius: 15px;
    font-size: 12px; width: 150px; text-align: center;
    box-shadow: 0 5px 10px rgba(0,0,0,0.1);
    display: none; font-weight: 600; color: var(--primary-dark);
}
.bubble-chat::after {
    content: ''; position: absolute; bottom: -8px; right: 20px;
    border-width: 8px 8px 0; border-style: solid; border-color: white transparent;
}

.hidden { display: none; }
@keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="bg-ornament">
    <i class="fas fa-mosque shape shape-1"></i>
    <i class="fas fa-star-and-crescent shape shape-2"></i>
    <i class="fas fa-book-quran shape shape-3"></i>
</div>

<div class="container">
    
    <header>
        <!-- USER LOGIN TOP RIGHT -->
        <div class="user-header">
            <input type="text" id="namaPengguna" placeholder="Nama Pengguna...">
        </div>

        <!-- CUSTOM LOGO SVG -->
        <svg class="logo-svg" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="48" fill="#fff" stroke="#0d9488" stroke-width="4"/>
            <path d="M50 10 L50 20 M50 80 L50 90 M10 50 L20 50 M80 50 L90 50" stroke="#0d9488" stroke-width="2" opacity="0.5"/>
            <path d="M30 70 Q50 20 70 70" fill="none" stroke="#0d9488" stroke-width="3"/>
            <circle cx="50" cy="45" r="15" fill="#fbbf24"/>
            <path d="M45 42 L50 50 L55 42 M50 50 L50 38" stroke="#78350f" stroke-width="2" fill="none"/>
            <path d="M25 75 Q50 85 75 75" fill="#0d9488"/>
        </svg>

        <h1>Keuangan Pesantren</h1>
        
        <div class="ramadan-banner">
            <p class="ramadan-text">Ramadhan Kareem</p>
        </div>

        <div id="clock" class="realtime-clock">
            <i class="fas fa-clock"></i> <span id="time">Loading...</span>
        </div>
    </header>

    <!-- Navigation -->
    <div class="nav" id="mainNav">
        <button onclick="showPage('dashboard')" id="nav-dashboard" class="active"><i class="fas fa-chart-pie"></i> Dashboard</button>
        <button onclick="showPage('keuangan')" id="nav-keuangan"><i class="fas fa-wallet"></i> Keuangan</button>
        <button onclick="showPage('inventaris')" id="nav-inventaris"><i class="fas fa-boxes-stacked"></i> Inventaris</button>
    </div>

    <!-- DASHBOARD PAGE -->
    <div id="dashboard" class="page">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="margin:0;"><i class="fas fa-filter"></i> Filter Data</h3>
                <button class="btn-3d accent" onclick="printDashboard()"><i class="fas fa-file-pdf"></i> PDF</button>
            </div>
            <div class="filter-grid">
                <div><label>Tanggal Mulai</label><input type="date" id="tglMulai"></div>
                <div><label>Tanggal Akhir</label><input type="date" id="tglAkhir"></div>
                <button class="btn-3d secondary" onclick="loadDashboard()"><i class="fas fa-search"></i> Filter</button>
            </div>
        </div>
        
        <div class="stat-grid" id="dashStats">
            <div class="stat-card saldo">
                <h3>Total Saldo</h3><p id="saldo">Rp 0</p>
                <i class="fas fa-piggy-bank stat-icon"></i>
            </div>
            <div class="stat-card masuk">
                <h3>Pemasukan</h3><p id="masuk">Rp 0</p>
                <i class="fas fa-wallet stat-icon"></i>
            </div>
            <div class="stat-card keluar">
                <h3>Pengeluaran</h3><p id="keluar">Rp 0</p>
                <i class="fas fa-receipt stat-icon"></i>
            </div>
        </div>
        
        <div class="card">
            <div class="chart-wrapper">
                <canvas id="chart"></canvas>
            </div>
        </div>
    </div>

    <!-- KEUANGAN PAGE -->
    <div id="keuangan" class="page hidden">
        <div class="card">
            <h2 style="margin-top:0;"><i class="fas fa-hand-holding-dollar"></i> Input Transaksi</h2>
            <label>Tanggal</label><input id="tanggal" type="date">
            <label>Keterangan</label><input id="keterangan" placeholder="Contoh: Pembayaran SPP Bulan Januari">
            <label>Kategori</label>
            <select id="kategoriKeuangan" onchange="toggleInputKeuangan()">
                <option value="">-- Pilih Kategori --</option>
                <option value="Pemasukan">Pemasukan</option>
                <option value="Pengeluaran">Pengeluaran</option>
            </select>
            <label>Jumlah Uang Masuk (Rp)</label><input id="masukInput" placeholder="Otomatis aktif jika Pemasukan" disabled>
            <label>Jumlah Uang Keluar (Rp)</label><input id="keluarInput" placeholder="Otomatis aktif jika Pengeluaran" disabled>
            <!-- Hidden ID for Edit -->
            <input type="hidden" id="editIdKeuangan">
            
            <div style="display:flex; gap:10px;">
                <button class="btn-3d primary full" onclick="kirimKeuangan()"><i class="fas fa-save"></i> Simpan</button>
                <button class="btn-3d danger hidden" id="btnCancelEdit" onclick="cancelEdit()"><i class="fas fa-times"></i> Batal</button>
            </div>
        </div>
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <h3 style="margin:0;"><i class="fas fa-history"></i> Riwayat Transaksi</h3>
                <button class="btn-3d accent" onclick="printKeuangan()"><i class="fas fa-share-nodes"></i> Share/PDF</button>
            </div>
            <div class="table-container">
                <table id="tableKeuangan">
                    <thead><tr><th>Tanggal</th><th>Keterangan</th><th>Kategori</th><th>Masuk</th><th>Keluar</th><th>Aksi</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- INVENTARIS PAGE -->
    <div id="inventaris" class="page hidden">
        <div class="card">
            <h2 style="margin-top:0;"><i class="fas fa-boxes-stacked"></i> Input Inventaris</h2>
            <label>Nama Barang</label><input id="barang" placeholder="Contoh: Beras 5kg">
            <label>Jumlah</label><input id="jumlah" type="number" placeholder="Jumlah barang">
            <label>Tipe Transaksi</label>
            <select id="tipe"><option value="Masuk">Stok Masuk</option><option value="Keluar">Stok Keluar</option></select>
            <input type="hidden" id="editIdInventaris">
            <button class="btn-3d primary full" onclick="kirimInventaris()"><i class="fas fa-save"></i> Simpan Inventaris</button>
        </div>
        <div class="card">
            <h3><i class="fas fa-history"></i> Riwayat Stok Inventaris</h3>
            <div class="table-container">
                <table id="tableInventaris"><thead><tr><th>Barang</th><th>Jumlah</th><th>Tipe</th><th>Waktu</th><th>Aksi</th></tr></thead><tbody></tbody></table>
            </div>
        </div>
    </div>
</div>

<!-- SANTRI HELPER -->
<div class="santri-helper" onclick="speakIntro()">
    <div class="bubble-chat" id="chatBubble">Assalamualaikum!</div>
    <!-- SVG Santri -->
    <svg class="santri-svg" viewBox="0 0 200 300">
        <!-- Kepala & Peci -->
        <circle cx="100" cy="50" r="35" fill="#fbd38d"/> <!-- Wajah -->
        <path d="M65 35 Q100 -10 135 35 Q100 20 65 35" fill="#1f2937"/> <!-- Peci -->
        <!-- Badan Batik Hijau -->
        <path d="M60 85 Q100 70 140 85 L150 180 H50 Z" fill="#0d9488"/>
        <path d="M60 90 L70 180 M100 85 L100 180 M140 90 L130 180" stroke="#004d40" stroke-width="2" fill="none" opacity="0.5"/>
        <!-- Kemeja luar Coklat -->
        <path d="M50 90 L20 150 L30 155 L55 110 L55 180 H145 L145 110 L170 155 L180 150 L150 90 Z" fill="#78350f"/>
        <!-- Tangan Melambai -->
        <g id="tangan" transform="rotate(0 100 100)">
            <path d="M150 100 L180 80 L185 85 L155 105 Z" fill="#fbd38d"/>
            <circle cx="183" cy="82" r="5" fill="#fbd38d"/>
        </g>
        <!-- Celana -->
        <path d="M55 180 L65 290 L85 290 L100 200 L115 290 L135 290 L145 180 Z" fill="#1f2937"/>
    </svg>
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbyH8SiNroAgjnhvI0Izw-VBG_xkBUq4FaQ3IyB18LqWeE1-1Yi9ogFjJH26FolP5rw5ig/exec";
let chart;

// --- CLOCK & DATE ---
function updateClock() {
    const now = new Date();
    document.getElementById('time').innerText = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
}
setInterval(updateClock, 1000); updateClock();

// --- TEXT TO SPEECH (SUara Santri) ---
function speak(text) {
    if ('speechSynthesis' in window) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'id-ID';
        utterance.rate = 1;
        window.speechSynthesis.speak(utterance);
    }
    // Show Bubble
    const bubble = document.getElementById('chatBubble');
    bubble.innerText = text;
    bubble.style.display = 'block';
    setTimeout(() => bubble.style.display = 'none', 4000);
}

function speakIntro() {
    const texts = [
        "Assalamualaikum, selamat datang di sistem keuangan pesantren.",
        "Jangan lupa isi nama di pojok kanan atas ya.",
        "Semoga sehat selalu."
    ];
    speak(texts[Math.floor(Math.random() * texts.length)]);
}

// --- NAVIGATION & ANIMATION ---
function showPage(page){
    document.querySelectorAll(".page").forEach(p => p.classList.add("hidden"));
    document.getElementById(page).classList.remove("hidden");
    document.querySelectorAll(".nav button").forEach(b => b.classList.remove("active"));
    document.getElementById("nav-" + page).classList.add("active");

    // Santri Voice
    const messages = {
        dashboard: "Ini dia ringkasan keuangan kita.",
        keuangan: "Yuk catat pemasukan dan pengeluaran disini.",
        inventaris: "Jangan lupa catat inventaris ya."
    };
    speak(messages[page]);
}

// --- KEUANGAN LOGIC ---
function toggleInputKeuangan(){
    const kategori = document.getElementById("kategoriKeuangan").value;
    const masukInput = document.getElementById("masukInput");
    const keluarInput = document.getElementById("keluarInput");
    if(kategori === "Pemasukan"){
        masukInput.disabled = false; keluarInput.disabled = true; keluarInput.value = "";
    } else if(kategori === "Pengeluaran"){
        masukInput.disabled = true; keluarInput.disabled = false; masukInput.value = "";
    } else {
        masukInput.disabled = true; keluarInput.disabled = true;
    }
}

function kirimKeuangan(){
    const id = document.getElementById("editIdKeuangan").value;
    const data = {
        action: id ? "update_keuangan" : "keuangan",
        id: id,
        tanggal: document.getElementById("tanggal").value,
        keterangan: document.getElementById("keterangan").value,
        kategori: document.getElementById("kategoriKeuangan").value,
        masuk: document.getElementById("masukInput").value,
        keluar: document.getElementById("keluarInput").value,
        pelapor: document.getElementById("namaPengguna").value || "Admin"
    };
    
    if(!data.kategori || !data.tanggal) { alert("Harap lengkapi tanggal dan kategori!"); return; }

    fetch(API, { method: "POST", body: JSON.stringify(data) })
    .then(res => res.text())
    .then(res => {
        alert(res);
        loadDashboard();
        loadRiwayatKeuangan();
        cancelEdit();
    });
}

function editKeuangan(id, tgl, ket, kat, masuk, keluar) {
    document.getElementById("editIdKeuangan").value = id;
    document.getElementById("tanggal").value = tgl;
    document.getElementById("keterangan").value = ket;
    document.getElementById("kategoriKeuangan").value = kat;
    toggleInputKeuangan();
    document.getElementById("masukInput").value = masuk;
    document.getElementById("keluarInput").value = keluar;
    document.getElementById("btnCancelEdit").classList.remove("hidden");
    window.scrollTo({ top: 0, behavior: 'smooth' });
    speak("Data dimuat, silakan edit.");
}

function cancelEdit() {
    document.getElementById("editIdKeuangan").value = "";
    document.getElementById("keterangan").value = "";
    document.getElementById("masukInput").value = "";
    document.getElementById("keluarInput").value = "";
    document.getElementById("kategoriKeuangan").value = "";
    toggleInputKeuangan();
    document.getElementById("btnCancelEdit").classList.add("hidden");
}

function loadDashboard(){
    fetch(API + "?action=dashboard")
    .then(res => res.json())
    .then(data => {
        let masuk = data.masuk || 0; let keluar = data.keluar || 0; let saldo = masuk - keluar;
        const formatter = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 });
        document.getElementById("saldo").innerText = formatter.format(saldo);
        document.getElementById("masuk").innerText = formatter.format(masuk);
        document.getElementById("keluar").innerText = formatter.format(keluar);
        drawChart(masuk, keluar);
    });
}

function loadRiwayatKeuangan(){
    fetch(API + "?action=riwayat_keuangan")
    .then(res => res.json())
    .then(data => {
        const tbody = document.querySelector("#tableKeuangan tbody"); tbody.innerHTML = "";
        if(data && data.length > 0){
            data.forEach(row => {
                // row: [ID, Tanggal, Keterangan, Kategori, Masuk, Keluar]
                const tr = document.createElement("tr");
                tr.innerHTML = `
                    <td>${row[1]}</td><td>${row[2]}</td>
                    <td><span class="badge ${row[3] == 'Pemasukan' ? 'badge-success' : 'badge-danger'}">${row[3]}</span></td>
                    <td style="color:green">${row[4]}</td><td style="color:red">${row[5]}</td>
                    <td>
                        <button class='btn-3d secondary' style='padding:5px 10px; font-size:10px;' onclick="editKeuangan('${row[0]}','${row[1]}','${row[2]}','${row[3]}','${row[4]}','${row[5]}')"><i class='fas fa-edit'></i></button>
                    </td>`;
                tbody.appendChild(tr);
            });
        } else { tbody.innerHTML = "<tr><td colspan='6' style='text-align:center'>Belum ada data</td></tr>"; }
    });
}

// --- INVENTARIS LOGIC ---
function kirimInventaris(){
    const data = { action: "inventaris", barang: document.getElementById("barang").value, jumlah: document.getElementById("jumlah").value, tipe: document.getElementById("tipe").value };
    fetch(API, { method: "POST", body: JSON.stringify(data) })
    .then(res => res.text())
    .then(res => { alert(res); loadRiwayatInventaris(); });
}

function loadRiwayatInventaris(){
    fetch(API + "?action=riwayat_inventaris")
    .then(res => res.json())
    .then(data => {
        const tbody = document.querySelector("#tableInventaris tbody"); tbody.innerHTML = "";
        if(data && data.length > 0){
            data.forEach(row => {
                const tr = document.createElement("tr");
                tr.innerHTML = `<td>${row[1]}</td><td>${row[2]}</td><td><span class="badge ${row[3] == 'Masuk' ? 'badge-success' : 'badge-danger'}">${row[3]}</span></td><td>${row[4]}</td><td><button class='btn-3d danger' style='padding:5px; font-size:10px;'>Hapus</button></td>`;
                tbody.appendChild(tr);
            });
        }
    });
}

// --- CHART ---
function drawChart(masuk, keluar){
    const ctx = document.getElementById("chart").getContext('2d');
    if(chart) chart.destroy();
    chart = new Chart(ctx, {
        type: "doughnut",
        data: { labels: ["Pemasukan", "Pengeluaran"], datasets: [{ data: [masuk, keluar], backgroundColor: ["#0f766e", "#ef4444"], borderWidth: 0, hoverOffset: 10 }] },
        options: { responsive: true, cutout: '60%', plugins: { legend: { position: 'bottom' } } }
    });
}

// --- PDF GENERATION ---
async function printDashboard() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const nama = document.getElementById("namaPengguna").value || "Anonim";
    
    // Header
    doc.setFontSize(20); doc.setTextColor(15, 118, 110);
    doc.text("Laporan Keuangan Pesantren", 105, 20, null, null, "center");
    doc.setFontSize(12); doc.setTextColor(100);
    doc.text(`Penanggung Jawab: ${nama}`, 105, 30, null, null, "center");
    
    // Stats
    const saldo = document.getElementById("saldo").innerText;
    const masuk = document.getElementById("masuk").innerText;
    const keluar = document.getElementById("keluar").innerText;
    
    doc.setFontSize(14); doc.setTextColor(0);
    doc.text(`Total Saldo: ${saldo}`, 20, 50);
    doc.text(`Pemasukan: ${masuk}`, 20, 60);
    doc.text(`Pengeluaran: ${keluar}`, 20, 70);
    
    // Capture Chart
    const chartCanvas = document.getElementById('chart');
    const chartImage = chartCanvas.toDataURL('image/png', 1.0);
    doc.addImage(chartImage, 'PNG', 40, 90, 130, 80);
    
    doc.save("Laporan-Dashboard.pdf");
    speak("PDF Dashboard sedang diunduh.");
}

async function printKeuangan() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const nama = document.getElementById("namaPengguna").value || "Anonim";
    
    doc.setFontSize(18); doc.setTextColor(15, 118, 110);
    doc.text("Riwayat Transaksi Keuangan", 105, 20, null, null, "center");
    doc.setFontSize(11); doc.setTextColor(100);
    doc.text(`Pelapor: ${nama} | Tanggal Cetak: ${new Date().toLocaleDateString('id-ID')}`, 105, 28, null, null, "center");
    
    // Simple Table Manual (Basic)
    let y = 40;
    doc.setFontSize(10); doc.setTextColor(0);
    doc.text("Tanggal", 20, y); doc.text("Keterangan", 50, y); doc.text("Masuk", 120, y); doc.text("Keluar", 160, y);
    y += 5;
    doc.line(20, y, 190, y); y+=5;
    
    // Fetch data
    const res = await fetch(API + "?action=riwayat_keuangan");
    const data = await res.json();
    
    data.forEach(row => {
        if(y > 280) { doc.addPage(); y = 20; }
        doc.text(row[1], 20, y); // Tgl
        doc.text(row[2].substring(0, 30), 50, y); // Ket
        doc.text(row[4], 120, y); // Masuk
        doc.text(row[5], 160, y); // Keluar
        y += 7;
    });
    
    doc.save("Riwayat-Keuangan.pdf");
    speak("PDF Riwayat Keuangan diunduh.");
}

// INIT
document.addEventListener("DOMContentLoaded", () => {
    showPage('dashboard');
});
